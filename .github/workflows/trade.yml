name: Zimupaper trading bot

# Runs the bot on a schedule (free GitHub Actions) and commits updated state +
# dashboard back to the repo. The bot itself checks whether the market is open,
# so off-hours runs just record equity and hold.

on:
  schedule:
    # Every 30 min, 13:30-21:00 UTC, Mon-Fri. This window covers US market hours
    # (09:30-16:00 ET) across both EST and EDT. Cron is UTC; GitHub may delay runs.
    - cron: "0,30 13-20 * * 1-5"
    - cron: "0 21 * * 1-5"
  workflow_dispatch:        # lets you run it manually from the Actions tab

# Don't pile up overlapping runs.
concurrency:
  group: zimupaper-trading
  cancel-in-progress: false

permissions:
  contents: write           # needed to commit state + dashboard back to the repo

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one trading cycle
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_BASE_URL:   ${{ secrets.ALPACA_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py

      - name: Commit updated state + dashboard
        run: |
          git config user.name  "zimupaper-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/ docs/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "bot: trading cycle $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
